name: db
on:
  pull_request: { paths: ['supabase/**'] }
  push: { branches: [main], paths: ['supabase/**'] }
jobs:
  verify:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@ab058987d8d6c725971f6cf9d0b5c98467e30bd1 # v1
      - run: supabase db start
      - run: supabase db lint
      - run: supabase test db
  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@ab058987d8d6c725971f6cf9d0b5c98467e30bd1 # v1
      - name: Check if SUPABASE_PROJECT_REF is set
        id: guard
        run: |
          if [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "SUPABASE_PROJECT_REF not set, skipping deploy"
            echo "ref_set=false" >> "$GITHUB_OUTPUT"
          else
            echo "ref_set=true" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.guard.outputs.ref_set == 'true'
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"
      - if: steps.guard.outputs.ref_set == 'true'
        run: supabase db push
